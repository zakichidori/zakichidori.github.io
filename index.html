    <header class="hero">
      <div class="hero-brand">
        <!-- Chidori theme logo -->
        <img
          class="hero-logo chidori-logo"
          src="https://i.ibb.co/whfP7LmP/c-Users-zaki-App-Data-Roaming-Cursor-User-workspace-Storage-b2ff2dc92f04416442a5b765bc83d43b-images.png"
          alt="ChidoriHub logo"
        />
        <!-- FIX: removed hero-logo class from ypk-logo div to prevent conflicting display rules -->
        <div class="ypk-logo" aria-hidden="true">ypk</div>
        <div>
          <p id="siteKicker" class="kicker">Live Chidori Night</p>
          <h1 id="siteTitle">Chidori Hub Streaming</h1>
          <p id="siteSubtext" class="subtext">Electric lightning vibes with auto-loaded games and best source stream defaults.</p>
        </div>
      </div>
    </header>

    <section class="controls-card" aria-label="Filters and game controls">
      <div class="filters">
        <label for="sportSelect">Sport</label>
        <select id="sportSelect">
          <option value="">Loading sports...</option>
        </select>
      </div>
      <div class="filters">
        <label for="themeSelect">Theme</label>
        <select id="themeSelect">
          <option value="chidori">Chidori Theme</option>
          <option value="ypk">YPK Red Theme</option>
          <option value="micheal-scofield">Micheal Scofield</option>
          <option value="rasengan">Rasengan Orange</option>
          <option value="r4seem">Raseem Theme (R4)</option>
        </select>
      </div>
      <!-- FIX: aria-live so screen readers announce status changes -->
      <p id="statusText" class="status-text" aria-live="polite">Fetching live data...</p>
    </section>

    <section class="content-grid">
      <aside class="matches-card" aria-label="Matches list">
        <h2>Matches</h2>
        <div id="matchesList" class="matches-list"></div>
      </aside>

      <section class="player-card" aria-label="Game stream player">
        <div class="player-topbar">
          <h2 id="currentMatchTitle">Select a match</h2>
          <select id="streamSelect" disabled>
            <option value="">No streams loaded</option>
          </select>
        </div>

        <div class="player-wrap">
          <!-- FIX: loading overlay so users know the stream is buffering -->
          <div id="playerLoadingOverlay" class="player-loading-overlay" style="display:none;">
            <div class="player-spinner"></div>
            <span>Loading stream…</span>
          </div>
          <iframe
            id="streamPlayer"
            title="Live stream player"
            scrolling="no"
            allowfullscreen="yes"
            allow="encrypted-media; picture-in-picture;"
            width="100%"
            height="100%"
            frameborder="0"
          ></iframe>
        </div>
      </section>
    </section>
